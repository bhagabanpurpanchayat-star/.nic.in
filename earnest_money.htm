<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Earnest Money Register | Treasury Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2f6 100%);
            padding: 28px 24px;
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Modern Glassmorphic Card */
        .premium-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .premium-card:hover {
            box-shadow: 0 24px 48px -16px rgba(0, 0, 0, 0.12);
        }

        /* Elegant Header */
        .header-section {
            padding: 20px 28px;
            background: linear-gradient(135deg, #0a2c3a 0%, #134b5f 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .title-area h1 {
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff, #e2e8f0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-area p {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.65);
            margin-top: 4px;
            letter-spacing: 0.2px;
            font-weight: 400;
        }

        /* Modern Button Group */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-elegant {
            padding: 7px 18px;
            border: none;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.2px;
        }

        .btn-primary-elegant {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0a2c3a;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.25);
            font-weight: 600;
        }

        .btn-primary-elegant:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.35);
            background: linear-gradient(135deg, #fcd34d, #f59e0b);
        }

        .btn-elegant:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.2);
        }

        /* Info Bar */
        .info-bar {
            background: #f9fafb;
            margin: 20px 24px 0 24px;
            padding: 10px 20px;
            border-radius: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            font-family: 'Inter', sans-serif;
            color: #1e4a6e;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #e2e8f0;
        }

        .record-badge {
            background: linear-gradient(135deg, #134b5f, #0a2c3a);
            padding: 4px 14px;
            border-radius: 32px;
            color: white;
            font-weight: 500;
            font-size: 0.7rem;
            letter-spacing: 0.3px;
        }

        /* Table Wrapper */
        .table-premium-wrapper {
            padding: 0 20px 20px 20px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 16px;
            background: white;
            margin-top: 18px;
            border: 1px solid #e9edf2;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            min-width: 1200px;
        }

        /* Sharp Headers */
        .data-table th {
            background: #f8fafc;
            color: #1e4a6e;
            padding: 12px 12px;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f2f5;
            color: #334155;
            font-size: 0.68rem;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }

        .data-table tbody tr:hover {
            background: #fefce8;
        }

        /* Status Badges - Sharp */
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.62rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.2px;
        }

        .status-paid {
            background: #dcfce7;
            color: #166534;
            border-left: 2px solid #22c55e;
        }

        .status-pending {
            background: #fef3c7;
            color: #b45309;
            border-left: 2px solid #f59e0b;
        }

        /* Amount Styling */
        .amount-cell {
            font-weight: 600;
            color: #0f5c2e;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
        }

        /* Footer */
        .footer-note {
            text-align: center;
            font-size: 0.6rem;
            font-family: 'Inter', sans-serif;
            color: #64748b;
            margin-top: 16px;
            padding: 12px;
            background: #fafcfd;
            border-radius: 24px;
            margin: 16px 24px 24px 24px;
            border: 1px solid #e9edf2;
        }

        /* Loading Spinner */
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #e2e8f0;
            border-top: 2px solid #134b5f;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @media (max-width: 780px) {
            body { padding: 14px; }
            .header-section { flex-direction: column; align-items: stretch; text-align: center; }
            .title-area h1 { font-size: 1.2rem; justify-content: center; }
            .btn-group { justify-content: center; }
            .info-bar { margin: 16px 16px 0 16px; flex-direction: column; align-items: stretch; text-align: center; }
            .table-premium-wrapper { padding: 0 12px 12px 12px; }
            .footer-note { margin: 12px 16px 16px 16px; }
        }

        /* PRINT STYLES - DOTTED BORDERS */
        @media print {
            body {
                background: white;
                padding: 0.2in;
                margin: 0;
            }
            
            .btn-group, .btn-elegant, .info-bar, .footer-note, .header-section .btn-group, .record-badge {
                display: none !important;
            }
            
            .premium-card {
                box-shadow: none;
                border-radius: 0;
                background: white;
                margin: 0;
                padding: 0;
            }
            
            .header-section {
                background: #0a2c3a;
                padding: 8px 12px;
                margin-bottom: 12px;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .title-area h1 {
                color: white;
                background: none;
                -webkit-background-clip: unset;
                background-clip: unset;
                font-size: 14pt;
            }
            
            .title-area p {
                color: #cbd5e1;
                font-size: 8pt;
            }
            
            .table-premium-wrapper {
                padding: 0;
                margin: 0;
            }
            
            .table-container {
                border: none;
                overflow: visible;
            }
            
            .data-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 9pt;
            }
            
            .data-table th {
                background: #f1f5f9 !important;
                color: #0a2c3a !important;
                border: 1px dotted #94a3b8 !important;
                padding: 8px 6px !important;
                font-size: 8pt !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .data-table td {
                border: 1px dotted #cbd5e1 !important;
                padding: 6px !important;
                font-size: 8pt !important;
            }
            
            .data-table tr {
                page-break-inside: avoid;
            }
            
            .status-badge {
                border: 1px dotted #94a3b8;
                background: none !important;
                padding: 2px 6px;
            }
            
            .amount-cell {
                font-weight: 600;
            }
            
            .dashboard-container {
                max-width: 100%;
                margin: 0;
                padding: 0;
            }
        }
        
        /* EXPORT EXCEL STYLES - DOTTED BORDERS */
        @media print, screen {
            .data-table.export-mode th,
            .data-table.export-mode td {
                border: 1px dotted #999 !important;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="premium-card">
        <div class="header-section">
            <div class="title-area">
                <h1>
                    <span>🏛️</span> 
                    EARNEST MONEY REGISTER
                </h1>
                <p>Treasury Department | Earnest Deposit Tracker | Real-time Data</p>
            </div>
            <div class="btn-group">
                <button class="btn-elegant" id="backBtn">← Back</button>
                <button class="btn-elegant" id="refreshBtn">↻ Refresh</button>
                <button class="btn-elegant btn-primary-elegant" id="printBtn">🖨️ Print</button>
                <button class="btn-elegant btn-primary-elegant" id="exportBtn">📎 Excel</button>
            </div>
        </div>
        
        <div class="info-bar">
            <span class="record-badge" id="recordCountBadge">📋 Records: —</span>
            <span style="font-size:0.65rem;">🖨️ Print | 📎 Export Excel with dotted borders</span>
        </div>

        <div class="table-premium-wrapper">
            <div class="table-container">
                <table class="data-table" id="registerTable">
                    <thead id="tableHeader"></thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="20" style="text-align:center; padding: 50px;">
                                <div class="loading-spinner"></div>
                                <div style="font-family:'Inter', sans-serif; font-size:0.7rem;">Loading earnest money data...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="footer-note">
            🏛️ Earnest Money Register | Data from Google Sheets | Dotted borders on print & export
        </div>
    </div>
</div>

<script>
    // ======================= CONFIGURATION =======================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLIWh075mzwO7Wvmxgxr6aKZds1HGPrD4zqG2iAWq-dfjEfx10M7wOgMEc3WUYD1hO/exec";
    
    const COLUMN_HEADERS = [
        "UNIQUE NIT", "NIT", "SL", "NIT DATE", "Activity ID",
        "Name of the work", "VENDOR", "EARNEST MONEY",
        "Payment Status", "Tender Status", "Cheque No", "Date", "Source of Fund"
    ];
    
    let currentData = [];
    let headers = [...COLUMN_HEADERS];
    while (headers.length < 13) headers.push("Extra");
    headers = headers.slice(0, 13);
    
    const tableHeader = document.getElementById("tableHeader");
    const tableBody = document.getElementById("tableBody");
    const recordCountBadge = document.getElementById("recordCountBadge");
    
    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatCurrency(value) {
        if (!value || value === "") return "—";
        let num = parseFloat(value.toString().replace(/[^0-9.-]/g, ''));
        if (isNaN(num) || num === 0) return value;
        return "₹" + num.toLocaleString('en-IN');
    }
    
    async function fetchSheetData() {
        showLoadingState(true);
        try {
            const url = WEB_APP_URL + (WEB_APP_URL.includes('?') ? '&' : '?') + '_cb=' + Date.now();
            const response = await fetch(url, { method: 'GET', mode: 'cors' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            
            let rows = [];
            if (Array.isArray(data)) rows = data;
            else if (data.data && Array.isArray(data.data)) rows = data.data;
            else if (data.values && Array.isArray(data.values)) rows = data.values;
            else throw new Error("Invalid JSON format from Web App");
            
            if (!rows.length) throw new Error("No data received");
            processRawRows(rows);
        } catch (err) {
            console.error(err);
            showErrorState(`❌ Failed to load: ${err.message}`);
        } finally {
            showLoadingState(false);
        }
    }
    
    function processRawRows(rows) {
        const cleanedRows = [];
        
        for (let row of rows) {
            if (!row || row.length === 0) continue;
            
            let headerKeywords = ["unique nit", "nit", "sl", "nit date", "activity id", "name of the work", "vendor", "earnest money", "payment status"];
            let matchCount = 0;
            for (let i = 0; i < Math.min(row.length, 8); i++) {
                let cellVal = row[i] ? String(row[i]).toLowerCase().trim() : "";
                if (headerKeywords.some(kw => cellVal.includes(kw) && cellVal.length > 2)) matchCount++;
            }
            if (matchCount >= 4) continue;
            
            const normalizedRow = [];
            for (let j = 0; j < 13; j++) {
                let val = (j < row.length && row[j] !== undefined && row[j] !== null) ? row[j] : "";
                if (val instanceof Date) {
                    val = val.toLocaleDateString('en-GB');
                } else {
                    val = String(val).trim();
                }
                normalizedRow.push(val);
            }
            if (normalizedRow.some(v => v !== "")) {
                cleanedRows.push(normalizedRow);
            }
        }
        
        if (cleanedRows.length === 0) {
            showErrorState("No valid data rows after processing.");
            return;
        }
        
        currentData = cleanedRows;
        renderTable();
        
        if (recordCountBadge) {
            recordCountBadge.innerHTML = `📋 Records: ${currentData.length}`;
        }
    }
    
    function renderTable() {
        if (!tableHeader || !tableBody) return;
        tableHeader.innerHTML = '';
        tableBody.innerHTML = '';
        
        const headerRow = document.createElement('tr');
        headers.forEach(headerText => {
            const th = document.createElement('th');
            th.textContent = headerText;
            headerRow.appendChild(th);
        });
        tableHeader.appendChild(headerRow);
        
        if (!currentData.length) {
            const emptyRow = document.createElement('tr');
            const td = document.createElement('td');
            td.colSpan = headers.length;
            td.textContent = "📭 No records found.";
            td.style.textAlign = "center";
            td.style.padding = "48px";
            emptyRow.appendChild(td);
            tableBody.appendChild(emptyRow);
            return;
        }
        
        currentData.forEach(row => {
            const tr = document.createElement('tr');
            for (let col = 0; col < headers.length; col++) {
                const td = document.createElement('td');
                let rawVal = (col < row.length) ? row[col] : "";
                let displayVal = rawVal === "" ? "—" : String(rawVal);
                
                if (col === 8 && headers[col] === "Payment Status") {
                    const lowerStatus = displayVal.toLowerCase();
                    let badgeClass = "status-badge";
                    if (lowerStatus.includes("paid") || lowerStatus.includes("released")) {
                        badgeClass = "status-badge status-paid";
                    } else if (lowerStatus.includes("pend") || lowerStatus.includes("pending")) {
                        badgeClass = "status-badge status-pending";
                    }
                    td.innerHTML = `<span class="${badgeClass}">${escapeHtml(displayVal)}</span>`;
                } 
                else if (col === 7 && headers[col] === "EARNEST MONEY") {
                    td.innerHTML = `<span class="amount-cell">${escapeHtml(formatCurrency(displayVal))}</span>`;
                }
                else {
                    td.textContent = displayVal;
                }
                tr.appendChild(td);
            }
            tableBody.appendChild(tr);
        });
    }
    
    // Export to Excel with DOTTED BORDERS
    function exportToExcel() {
        if (!currentData.length) {
            alert("No data to export.");
            return;
        }
        
        // Create a clone of the table for export
        const exportTable = document.createElement('table');
        exportTable.style.borderCollapse = 'collapse';
        exportTable.style.width = '100%';
        
        // Add headers
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        headers.forEach(header => {
            const th = document.createElement('th');
            th.textContent = header;
            th.style.border = '1px dotted #999';
            th.style.padding = '8px';
            th.style.backgroundColor = '#f5f5f5';
            th.style.fontWeight = 'bold';
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        exportTable.appendChild(thead);
        
        // Add data rows
        const tbody = document.createElement('tbody');
        currentData.forEach(row => {
            const tr = document.createElement('tr');
            for (let col = 0; col < headers.length; col++) {
                const td = document.createElement('td');
                let rawVal = (col < row.length) ? row[col] : "";
                let displayVal = rawVal === "" ? "—" : String(rawVal);
                
                if (col === 8 && headers[col] === "Payment Status") {
                    td.textContent = displayVal;
                } else if (col === 7 && headers[col] === "EARNEST MONEY") {
                    td.textContent = formatCurrency(displayVal);
                } else {
                    td.textContent = displayVal;
                }
                td.style.border = '1px dotted #999';
                td.style.padding = '6px';
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        });
        exportTable.appendChild(tbody);
        
        // Convert to worksheet
        const ws = XLSX.utils.table_to_sheet(exportTable);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Earnest_Money_Register");
        XLSX.writeFile(wb, `EarnestMoney_${new Date().toISOString().slice(0,19).replace(/:/g, "-")}.xlsx`);
    }
    
    function printRegister() {
        if (!currentData.length) {
            alert("No records available to print.");
            return;
        }
        window.print();
    }
    
    function showLoadingState(isLoading) {
        if (isLoading && (!currentData.length)) {
            if (tableBody) {
                tableBody.innerHTML = `<tr><td colspan="20" style="text-align:center; padding: 50px;"><div class="loading-spinner"></div><div>Fetching data...</div></td></tr>`;
            }
            if (tableHeader) tableHeader.innerHTML = '';
        }
    }
    
    function showErrorState(msg) {
        if (tableBody) {
            tableBody.innerHTML = `<tr><td colspan="20" style="text-align:center; padding: 50px; color:#b91c1c;">⚠️ ${escapeHtml(msg)}</td></tr>`;
        }
        if (recordCountBadge) recordCountBadge.innerText = `📋 Error`;
    }
    
    function refreshData() {
        currentData = [];
        if (tableBody) {
            tableBody.innerHTML = `<tr><td colspan="20" style="text-align:center; padding: 50px;"><div class="loading-spinner"></div><div>Refreshing...</div></td></tr>`;
        }
        fetchSheetData();
    }
    
    function goBack() {
        if (document.referrer && document.referrer !== "") {
            window.location.href = document.referrer;
        } else {
            window.history.back();
        }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        fetchSheetData();
        
        document.getElementById('backBtn')?.addEventListener('click', goBack);
        document.getElementById('refreshBtn')?.addEventListener('click', refreshData);
        document.getElementById('printBtn')?.addEventListener('click', printRegister);
        document.getElementById('exportBtn')?.addEventListener('click', exportToExcel);
    });
</script>
</body>
</html>
